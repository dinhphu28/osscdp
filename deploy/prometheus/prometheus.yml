global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: cdp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["cdp-api:8080"]
  - job_name: cdp-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["cdp-worker:9100"]
